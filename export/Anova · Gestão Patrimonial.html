management\">\n\n<div id=\"anova-nav\"><\u002Fdiv>\n\n<!-- ═══ HERO ═══ -->\n<header class=\"hero\">\n  <div class=\"wrap\">\n    <div class=\"hero-head\">\n      <span class=\"ticker\">Gestão Patrimonial · Multi-custódia<\u002Fspan>\n      <span class=\"ts\">Estrutura → Alinhamento<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"hero-top\" data-reveal=\"\">\n      <div class=\"hero-top-copy\">\n        <h1>\n          Seu patrimônio<br>merece a estrutura<br><em>alinhada a seus interesses.<\u002Fem>\n        <\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"hero-portrait\" data-reveal=\"\" data-delay=\"1\" style=\"width:400px;height:400px;\">\n        <img src=\"b771dff8-0b5f-428c-b779-92ae4aeef1ee\" alt=\"Cliente sênior em consulta via WhatsApp\" loading=\"eager\" style=\"object-fit:cover;\">\n        <span class=\"portrait-tick\">Ao vivo · WhatsApp<\u002Fspan>\n        <div class=\"portrait-badge\">\n          <div class=\"p-num\">R$ 2<small>Bi<\u002Fsmall><\u002Fdiv>\n          <div class=\"p-label\">Sob operação<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"portrait-quote\">\n          <q>A relação não passa mais por call center. Passa pela conversa onde o patrimônio de fato se decide.<\u002Fq>\n          <div class=\"q-who\">Cliente · 7 instituições · Multi-custódia<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"hero-sub\" data-reveal=\"\" data-delay=\"1\">\n      Operamos um modelo multi-custódia real, <a href=\"research.html\">research proprietária<\u002Fa> e remuneração atrelada à performance, sem o preço, a fricção e o conflito de interesse do atendimento tradicional. O dinheiro continua na sua conta, nas instituições que você escolher. Nós só ganhamos quando a sua carteira ganha.\n    <\u002Fp>\n\n    <div class=\"hero-cta\" data-reveal=\"\" data-delay=\"2\">\n      <a href=\"#cta\" class=\"btn-prime\">Falar com um especialista <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <a href=\"#alinhamento\" class=\"btn-ghost\">Ver modelo de cobrança<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"hero-stats\" data-reveal=\"\" data-delay=\"3\">\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-label\">Sob operação<\u002Fspan>\n        <span class=\"hero-stat-num\">R$ 2<small>&nbsp;Bi<\u002Fsmall><\u002Fspan>\n        <span class=\"hero-stat-sub\">Patrimônio real operando hoje na mesma estrutura.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-label\">Instituições<\u002Fspan>\n        <span class=\"hero-stat-num\">7<\u002Fspan>\n        <span class=\"hero-stat-sub\">BTG, XP, Avenue, Safra, BTG Global, XP Int, IBKR.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-label\">Mercado regulado<\u002Fspan>\n        <span class=\"hero-stat-num\">8<small>&nbsp;anos<\u002Fsmall><\u002Fspan>\n        <span class=\"hero-stat-sub\">Operação contínua, com histórico auditável.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-label\">Rebate na prateleira<\u002Fspan>\n        <span class=\"hero-stat-num\">0<\u002Fspan>\n        <span class=\"hero-stat-sub\">Taxa cheia no cliente. Sem spread escondido.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═══ §01 · PROBLEMA ═══ -->\n<section class=\"section section-alt\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">01 · Problema estrutural<\u002Fspan>\n      <span class=\"ts\">Por que não é moral · é estrutural<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\">\n      Quem te atende hoje<br>é remunerado<br><em>pelo quê?<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      Assessor, banker, consultor, casa de análise, family office tradicional, quase todos são remunerados pela comissão do produto que vendem, não pelo resultado que geram. É o padrão do mercado. O mesmo padrão que faz a prateleira favorecer o produto que paga mais rebate e não o que se encaixa no seu perfil. A assimetria é estrutural.&nbsp;\nSó desaparece quando a estrutura muda.\n    <\u002Fp>\n\n    <div class=\"prob-grid\">\n      <div class=\"prob\" data-reveal=\"\" data-delay=\"1\">\n        <div class=\"prob-num\">P · 01<\u002Fdiv>\n        <h3>Quem recomenda, também vende.<\u002Fh3>\n        <p>O produto que chega raramente é o melhor — é o que paga a maior comissão. O conselho vira pitch. O incentivo fica em conflito silencioso.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prob\" data-reveal=\"\" data-delay=\"2\">\n        <div class=\"prob-num\">P · 02<\u002Fdiv>\n        <h3>Rebate come a rentabilidade.<\u002Fh3>\n        <p>Operação que paga 14% no mercado chega como 13,5% no cliente. O spread fica com o intermediário. Ao longo dos anos, é patrimônio vazando em silêncio.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"prob\" data-reveal=\"\" data-delay=\"3\">\n        <div class=\"prob-num\">P · 03<\u002Fdiv>\n        <h3>Custódia única, conflito embutido.<\u002Fh3>\n        <p>Uma instituição só controla prateleira, execução e relacionamento. Fora dela, a resposta é \"não temos\" — e a melhor taxa fica em outra mesa.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §02 · COMO OPERAMOS ═══ -->\n<section class=\"section section-dark\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">02 · Como operamos a sua gestão<\u002Fspan>\n      <span class=\"ts\">5 camadas · 1 equipe<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\" style=\"color:var(--white);\">\n      O modelo UHNW.<br>Sem o preço.<br><em>Sem a fricção.<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      O dinheiro permanece na sua conta, nas instituições que você escolher. A Anova opera a alocação com <a href=\"research.html\">research proprietária<\u002Fa> por trás de cada decisão rebalanceia conforme o mercado muda e atende pelo WhatsApp, o canal que você já usa. A mesma sofisticação que uma família UHNW acessa no private banking internacional, agora sem spread, sem rebate e sem produto empurrado.\n    <\u002Fp>\n\n    <div class=\"layers\">\n      <div class=\"layer\" data-reveal=\"\">\n        <div class=\"layer-idx\">01<\u002Fdiv>\n        <div class=\"layer-title\">Consolidação<\u002Fdiv>\n        <div class=\"layer-desc\">Todos os seus ativos, em todas as instituições, num painel único via Open Finance. O dinheiro continua na sua conta&nbsp; nós organizamos a visão e a decisão.<\u002Fdiv>\n        <div class=\"layer-tag\">Open Finance<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layer\" data-reveal=\"\" data-delay=\"1\">\n        <div class=\"layer-idx\">02<\u002Fdiv>\n        <div class=\"layer-title\">Diagnóstico<\u002Fdiv>\n        <div class=\"layer-desc\">Entendemos seu patrimônio, objetivos, horizonte e tolerância real ao risco não a que cabe em formulário de dez perguntas.<\u002Fdiv>\n        <div class=\"layer-tag\">Perfil real<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layer\" data-reveal=\"\" data-delay=\"2\">\n        <div class=\"layer-idx\">03<\u002Fdiv>\n        <div class=\"layer-title\">Carteira com fundamento<\u002Fdiv>\n        <div class=\"layer-desc\">Alocação sob medida, com as teses ativas da <a href=\"research.html\">casa de análise Anova<\u002Fa> por trás. Cada decisão carrega argumento  você não precisa confiar, pode verificar.<\u002Fdiv>\n        <div class=\"layer-tag\">Research-led<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layer\" data-reveal=\"\" data-delay=\"3\">\n        <div class=\"layer-idx\">04<\u002Fdiv>\n        <div class=\"layer-title\">Execução BR e USD<\u002Fdiv>\n        <div class=\"layer-desc\">Câmbio, carteiras dolarizadas e prateleira completa, sem spread de assessor. Rebalanceamento contínuo e acesso direto ao time de gestão.<\u002Fdiv>\n        <div class=\"layer-tag\">Multi-mercado<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layer\" data-reveal=\"\" data-delay=\"4\">\n        <div class=\"layer-idx\">05<\u002Fdiv>\n        <div class=\"layer-title\">Crédito multibanco<\u002Fdiv>\n        <div class=\"layer-desc\">Quando precisar de financiamento, consórcio, seguro ou empréstimo, colocamos <a href=\"credito.html\">80+ instituições cotando<\u002Fa> lado a lado. Mesma estrutura que cuida da carteira.<\u002Fdiv>\n        <div class=\"layer-tag\">80+ parceiros<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §03 · ALINHAMENTO ═══ -->\n<section id=\"alinhamento\" class=\"section section-dark\" style=\"border-top:1px solid rgba(255,255,255,.08);\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">03 · Alinhamento de interesse<\u002Fspan>\n      <span class=\"ts\">Perf → só sobre alpha<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\" style=\"color:var(--white);\">\n      Só ganhamos<br>quando <em>você ganha.<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      No modelo tradicional, quem recomenda também vende e o incentivo fica em conflito silencioso. Aqui, o contrato é diferente: três componentes na remuneração, zero escondidos.\n    <\u002Fp>\n\n    <div class=\"align-grid\">\n      <ul class=\"align-list\">\n        <li>\n          <div class=\"align-label\">Taxa de administração<\u002Fdiv>\n          <div class=\"align-text\">Percentual anual sobre o patrimônio, pré-acordado com o especialista que te atende. Descontado em frações diárias sem surpresa no extrato, sem cobrança escondida.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"align-label\">Taxa de performance<\u002Fdiv>\n          <div class=\"align-text\">Só incide se a sua carteira superar o benchmark no período. Uma parte do ganho excedente vira a nossa remuneração. Se não superar, não cobramos performance.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"align-label\">Zero spread na prateleira<\u002Fdiv>\n          <div class=\"align-text\">Se uma operação paga 14% no mercado, você recebe 14%. Não 13,5%. Nosso ganho não está na diferença está no resultado.<\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n\n      <div class=\"align-card\">\n        <div class=\"align-card-head\">\n          <span class=\"align-card-eyebrow\">Modelo de cobrança<\u002Fspan>\n          <span class=\"align-card-ts\">perf → só sobre alpha<\u002Fspan>\n        <\u002Fdiv>\n\n        <svg class=\"align-chart\" viewBox=\"0 0 620 380\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n          <defs>\n            <linearGradient id=\"alpha-fill\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#FFFFFF\" stop-opacity=\".28\"><\u002Fstop>\n              <stop offset=\"1\" stop-color=\"#FFFFFF\" stop-opacity=\".02\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <pattern id=\"alpha-hatch\" patternUnits=\"userSpaceOnUse\" width=\"6\" height=\"6\" patternTransform=\"rotate(45)\">\n              <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"6\" stroke=\"rgba(255,255,255,.16)\" stroke-width=\"1\"><\u002Fline>\n            <\u002Fpattern>\n          <\u002Fdefs>\n\n          <!-- Grid rows -->\n          <g stroke=\"rgba(255,255,255,.06)\" stroke-width=\"1\">\n            <line x1=\"60\" y1=\"60\" x2=\"480\" y2=\"60\"><\u002Fline>\n            <line x1=\"60\" y1=\"140\" x2=\"480\" y2=\"140\"><\u002Fline>\n            <line x1=\"60\" y1=\"220\" x2=\"480\" y2=\"220\"><\u002Fline>\n            <line x1=\"60\" y1=\"300\" x2=\"480\" y2=\"300\"><\u002Fline>\n          <\u002Fg>\n\n          <!-- Axis -->\n          <line x1=\"60\" y1=\"60\" x2=\"60\" y2=\"300\" stroke=\"rgba(255,255,255,.25)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"60\" y1=\"300\" x2=\"480\" y2=\"300\" stroke=\"rgba(255,255,255,.25)\" stroke-width=\"1\"><\u002Fline>\n\n          <!-- Y labels -->\n          <g font-family=\"ui-monospace, monospace\" font-size=\"10\" fill=\"rgba(255,255,255,.5)\" letter-spacing=\".04em\">\n            <text x=\"52\" y=\"64\" text-anchor=\"end\">+20%<\u002Ftext>\n            <text x=\"52\" y=\"144\" text-anchor=\"end\">+10%<\u002Ftext>\n            <text x=\"52\" y=\"224\" text-anchor=\"end\">+5%<\u002Ftext>\n            <text x=\"52\" y=\"304\" text-anchor=\"end\">0%<\u002Ftext>\n          <\u002Fg>\n\n          <!-- X labels -->\n          <g font-family=\"ui-monospace, monospace\" font-size=\"10\" fill=\"rgba(255,255,255,.5)\" letter-spacing=\".04em\">\n            <text x=\"60\" y=\"322\" text-anchor=\"middle\">T0<\u002Ftext>\n            <text x=\"165\" y=\"322\" text-anchor=\"middle\">Q1<\u002Ftext>\n            <text x=\"270\" y=\"322\" text-anchor=\"middle\">Q2<\u002Ftext>\n            <text x=\"375\" y=\"322\" text-anchor=\"middle\">Q3<\u002Ftext>\n            <text x=\"480\" y=\"322\" text-anchor=\"middle\">Q4<\u002Ftext>\n          <\u002Fg>\n\n          <!-- Alpha area (between portfolio and benchmark) -->\n          <path d=\"M 60 300 C 165 276, 270 220, 480 90 L 480 220 C 270 260, 165 288, 60 300 Z\" fill=\"url(#alpha-fill)\"><\u002Fpath>\n          <path d=\"M 60 300 C 165 276, 270 220, 480 90 L 480 220 C 270 260, 165 288, 60 300 Z\" fill=\"url(#alpha-hatch)\"><\u002Fpath>\n\n          <!-- Benchmark (dashed) -->\n          <path d=\"M 60 300 C 165 288, 270 260, 480 220\" fill=\"none\" stroke=\"rgba(255,255,255,.5)\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"><\u002Fpath>\n\n          <!-- Portfolio (solid, bold) -->\n          <path d=\"M 60 300 C 165 276, 270 220, 480 90\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpath>\n\n          <!-- End markers -->\n          <circle cx=\"480\" cy=\"90\" r=\"5\" fill=\"#FFFFFF\"><\u002Fcircle>\n          <circle cx=\"480\" cy=\"220\" r=\"4\" fill=\"none\" stroke=\"rgba(255,255,255,.55)\" stroke-width=\"1.5\"><\u002Fcircle>\n\n          <!-- Right-side callouts (outside plot area) -->\n          <g font-family=\"SF Pro Display, system-ui, sans-serif\">\n            <!-- Portfolio label -->\n            <line x1=\"485\" y1=\"90\" x2=\"500\" y2=\"90\" stroke=\"rgba(255,255,255,.35)\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"506\" y=\"87\" font-size=\"11\" font-weight=\"600\" fill=\"#FFFFFF\" letter-spacing=\".02em\">Sua carteira<\u002Ftext>\n            <text x=\"506\" y=\"101\" font-size=\"10\" fill=\"rgba(255,255,255,.55)\" font-family=\"ui-monospace, monospace\" letter-spacing=\".04em\">+18,4%<\u002Ftext>\n\n            <!-- Benchmark label -->\n            <line x1=\"485\" y1=\"220\" x2=\"500\" y2=\"220\" stroke=\"rgba(255,255,255,.35)\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"506\" y=\"217\" font-size=\"11\" font-weight=\"600\" fill=\"rgba(255,255,255,.75)\" letter-spacing=\".02em\">Benchmark<\u002Ftext>\n            <text x=\"506\" y=\"231\" font-size=\"10\" fill=\"rgba(255,255,255,.45)\" font-family=\"ui-monospace, monospace\" letter-spacing=\".04em\">+7,0%<\u002Ftext>\n          <\u002Fg>\n\n          <!-- Alpha bracket right side -->\n          <g stroke=\"rgba(255,255,255,.45)\" stroke-width=\"1.25\" fill=\"none\">\n            <path d=\"M 486 94 Q 492 94 492 110 L 492 200 Q 492 216 486 216\"><\u002Fpath>\n          <\u002Fg>\n          <g font-family=\"SF Pro Display, system-ui, sans-serif\">\n            <text x=\"506\" y=\"155\" font-size=\"11\" font-weight=\"700\" fill=\"#FFFFFF\" letter-spacing=\".06em\">ALPHA<\u002Ftext>\n            <text x=\"506\" y=\"170\" font-size=\"10\" fill=\"rgba(255,255,255,.6)\" letter-spacing=\".02em\">+11,4 p.p.<\u002Ftext>\n          <\u002Fg>\n\n          <!-- Alpha caption below plot -->\n          <g font-family=\"ui-monospace, monospace\" font-size=\"10\" fill=\"rgba(255,255,255,.5)\" letter-spacing=\".08em\">\n            <text x=\"60\" y=\"360\">ÁREA HACHURADA = ALPHA · ÚNICA BASE DE TAXA DE PERFORMANCE<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n\n        <div class=\"align-legend\">\n          <div><span class=\"dot dot--solid\"><\u002Fspan>Sua carteira<\u002Fdiv>\n          <div><span class=\"dot dot--dash\"><\u002Fspan>Benchmark<\u002Fdiv>\n          <div><span class=\"dot dot--fill\"><\u002Fspan>Alpha — base da performance<\u002Fdiv>\n        <\u002Fdiv>\n\n        <p class=\"align-foot\">Se a carteira não superar o benchmark, não há alpha e não há taxa de performance. Gráfico ilustrativo; não representa rentabilidade passada nem promessa futura.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §04 · COMPARAÇÃO ═══ -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">04 · Comparação estrutural<\u002Fspan>\n      <span class=\"ts\">3 critérios · 4 modelos<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\">\n      O que muda<br>quando a estrutura<br><em>é honesta?<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      Três critérios. É onde o seu patrimônio cresce ou vaza em silêncio.\n    <\u002Fp>\n\n    <div class=\"comp\" data-reveal=\"\" data-delay=\"2\">\n      <div class=\"comp-row comp-row--head\">\n        <div>Critério<\u002Fdiv>\n        <div>Assessoria tradicional<\u002Fdiv>\n        <div>Fundo de investimento<\u002Fdiv>\n        <div>Private banking<\u002Fdiv>\n        <div class=\"anova\">Anova Gestão<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-crit\" data-label=\"Critério\">Custódia<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Assessoria\">Uma instituição<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Fundo\">Uma gestora<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Private\">Um banco<\u002Fdiv>\n        <div class=\"comp-anova\" data-label=\"Anova\">7 instituições (BR + EUA)<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-crit\" data-label=\"Critério\">Comissão por produto<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Assessoria\">Sim (rebate)<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Fundo\">Embutida na taxa<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Private\">Sim<\u002Fdiv>\n        <div class=\"comp-anova\" data-label=\"Anova\">Zero<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"comp-row\">\n        <div class=\"comp-crit\" data-label=\"Critério\">Alinhamento de interesse<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Assessoria\">Comissão por produto<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Fundo\">Taxa fixa, independente do resultado<\u002Fdiv>\n        <div class=\"comp-cell\" data-label=\"Private\">Comissão por produto<\u002Fdiv>\n        <div class=\"comp-anova\" data-label=\"Anova\">Remuneração vinculada à performance<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §05 · CUSTÓDIA ═══ -->\n<section class=\"section section-alt\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">05 · Onde seu dinheiro fica<\u002Fspan>\n      <span class=\"ts\">7 instituições · BR + EUA<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\">\n      Na sua conta.<br>Nas instituições<br><em>que você escolher.<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      A Anova nunca toca o seu dinheiro. Os ativos ficam custodiados nas instituições reguladas&nbsp; CVM e BACEN no Brasil, reguladores locais nos EUA. A titularidade é sua. A movimentação é sua. A gestão é nossa.\n    <\u002Fp>\n\n    <div class=\"cust-grid\">\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"1\">\n        <span class=\"cust-flag\">BR · CVM<\u002Fspan>\n        <span class=\"cust-name\">BTG Pactual<\u002Fspan>\n        <span class=\"cust-sub\">Conta corrente, renda fixa, ações.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"1\">\n        <span class=\"cust-flag\">BR · CVM<\u002Fspan>\n        <span class=\"cust-name\">XP<\u002Fspan>\n        <span class=\"cust-sub\">Plataforma completa de investimentos.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"2\">\n        <span class=\"cust-flag\">BR · CVM<\u002Fspan>\n        <span class=\"cust-name\">Safra<\u002Fspan>\n        <span class=\"cust-sub\">Banco, câmbio, renda fixa privada.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"2\">\n        <span class=\"cust-flag\">US · SEC<\u002Fspan>\n        <span class=\"cust-name\">Avenue<\u002Fspan>\n        <span class=\"cust-sub\">Conta e investimentos em dólar.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"3\">\n        <span class=\"cust-flag\">US · SEC<\u002Fspan>\n        <span class=\"cust-name\">BTG Global<\u002Fspan>\n        <span class=\"cust-sub\">Banking offshore e carteiras USD.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"3\">\n        <span class=\"cust-flag\">US · SEC<\u002Fspan>\n        <span class=\"cust-name\">XP Internacional<\u002Fspan>\n        <span class=\"cust-sub\">Prateleira global via XP US.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"4\">\n        <span class=\"cust-flag\">US · FINRA<\u002Fspan>\n        <span class=\"cust-name\">Interactive Brokers<\u002Fspan>\n        <span class=\"cust-sub\">Execução global em 150+ mercados.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cust\" data-reveal=\"\" data-delay=\"4\" style=\"opacity:.65;\">\n        <span class=\"cust-flag\">+ sob demanda<\u002Fspan>\n        <span class=\"cust-name\">Outras custódias<\u002Fspan>\n        <span class=\"cust-sub\">Casos específicos, avaliados 1-a-1.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §06 · NÃO É FUNDO ═══ -->\n<section class=\"section section-dark\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">06 · Carteira administrada · não é fundo<\u002Fspan>\n      <span class=\"ts\">Liquidez · tributação · controle<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\" style=\"color:var(--white);\">\n      Carteira administrada.<br><em>Não cota de veículo.<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      A distinção parece técnica e pesa no bolso ao longo do tempo. Seu dinheiro é tratado como <em>seu<\u002Fem> dinheiro, com as regras dos ativos que você carrega. Não como cota num veículo que impõe restrições coletivas.\n    <\u002Fp>\n\n    <div class=\"nofund-grid\">\n      <div class=\"nofund\" data-reveal=\"\" data-delay=\"1\">\n        <div class=\"nofund-tag\">Liquidez<\u002Fdiv>\n        <h3>Sem janela de 30, 60 ou 90 dias.<\u002Fh3>\n        <p>Fundos prendem capital em janelas fixas. Carteira administrada opera no ritmo dos próprios ativos se é líquido, você acessa. O calendário é seu.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"nofund\" data-reveal=\"\" data-delay=\"2\">\n        <div class=\"nofund-tag\">Tributação<\u002Fdiv>\n        <h3>Sem come-cotas semestral.<\u002Fh3>\n        <p>Fundos sofrem come-cotas duas vezes ao ano, antecipando imposto e reduzindo o efeito dos juros compostos. Aqui, cada ativo paga imposto na hora certa.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"nofund\" data-reveal=\"\" data-delay=\"3\">\n        <div class=\"nofund-tag\">Controle<\u002Fdiv>\n        <h3>Seu dinheiro continua seu.<\u002Fh3>\n        <p>Em fundo, você tem cota. Em carteira administrada, você tem os ativos na sua conta, na instituição que escolheu. A Anova orquestra a titularidade é sua.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §07 · PARA QUEM ═══ -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">07 · Para quem faz sentido<\u002Fspan>\n      <span class=\"ts\">3 perfis frequentes<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\">\n      Investidor<br>que já leu o jogo<br><em>e quer estrutura à altura.<\u002Fem>\n    <\u002Fh2>\n\n    <p class=\"sec-lead\" data-reveal=\"\" data-delay=\"1\" style=\"margin-top:var(--s5);\">\n      Não é para quem está começando. É para quem já tem tempo de mercado, já foi atendido por assessor, banker ou consultor, já leu prospecto e hoje busca estrutura onde o incentivo de quem atende esteja alinhado ao seu.\n    <\u002Fp>\n\n    <div class=\"aud-grid\">\n      <div class=\"aud\" data-reveal=\"\" data-delay=\"1\">\n        <div class=\"aud-tag\">Empresário<\u002Fdiv>\n        <h3>Patrimônio consolidado via empresa.<\u002Fh3>\n        <p>Construiu patrimônio com o próprio negócio. Hoje está distribuído entre bancos, corretoras, private banking, posições internacionais&nbsp; e conhece o preço real de incentivo desalinhado operando no escuro.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"aud\" data-reveal=\"\" data-delay=\"2\">\n        <div class=\"aud-tag\">Profissional liberal<\u002Fdiv>\n        <h3>Renda alta, já atendido por várias pontas.<\u002Fh3>\n        <p>Médico, advogado, engenheiro, consultor sênior. Sofisticação construída ao longo dos anos. Já passou por casa de análise, assessoria de corretora e butique independente e percebeu que conselho neutro é artigo raro.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"aud\" data-reveal=\"\" data-delay=\"3\">\n        <div class=\"aud-tag\">Executivo · Herdeiro<\u002Fdiv>\n        <h3>Técnico, exigente, desconfiado.<\u002Fh3>\n        <p>C-level, sócio de firma, herdeiro de segunda geração, executivo com bônus relevantes. Entende de mercado o suficiente para desconfiar de simplificação e busca gestão alinhada ao resultado, não conversa comercial com produto embaixo do braço.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §08 · FAQ ═══ -->\n<section class=\"section section-alt\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">08 · Perguntas frequentes<\u002Fspan>\n      <span class=\"ts\">O que chega na primeira conversa<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 class=\"sec-h2\" data-reveal=\"\">\n      Dúvidas<br>que costumamos<br><em>responder primeiro.<\u002Fem>\n    <\u002Fh2>\n\n    <div class=\"faq\" data-reveal=\"\" data-delay=\"1\">\n      <details>\n        <summary>Qual o patrimônio mínimo para começar?<\u002Fsummary>\n        <p>A conversa faz sentido a partir de patrimônios alocáveis relevantes o suficiente para justificar a estrutura multi-custódia. O número exato depende do seu perfil, dos ativos que você já carrega e da complexidade da operação. Preferimos discutir números na proposta — sem filtro automático por faixa.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>E se minha carteira não superar o benchmark no período?<\u002Fsummary>\n        <p>Se não superar, a Anova não cobra taxa de performance naquele período. A taxa de administração — percentual anual pré-acordado com o especialista — continua incidindo porque cobre o custo operacional da estrutura (research, execução, atendimento). A remuneração variável só existe quando a carteira gera resultado acima do benchmark combinado.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Como sei que a Anova não tem acesso direto ao meu dinheiro?<\u002Fsummary>\n        <p>Porque o dinheiro nunca sai da sua conta. Os ativos ficam custodiados nas instituições reguladas que você escolheu. A Anova opera a camada de gestão — escolha de ativos, alocação, acompanhamento — mas titularidade e movimentação permanecem com os parceiros, dentro do marco regulatório do mercado financeiro brasileiro e internacional.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Vocês são regulados?<\u002Fsummary>\n        <p>A Anova opera a camada de gestão e atendimento. A custódia, a execução e o compliance de cada operação acontecem via parceiros regulados por CVM e BACEN — e, quando aplicável, pelos reguladores das praças internacionais correspondentes (SEC, FINRA). Na primeira conversa, explicamos exatamente qual peça cabe a quem.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Posso sair quando quiser?<\u002Fsummary>\n        <p>Sim. Não existe lock-up, multa ou janela de resgate. Como os ativos vivem na sua conta, na instituição que você escolheu, a saída é uma decisão sua — e acontece no ritmo dos próprios ativos. A Anova para de orquestrar; a titularidade nunca esteve conosco.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Quanto tempo leva para começar?<\u002Fsummary>\n        <p>Após a primeira conversa, o diagnóstico leva de alguns dias a uma semana, dependendo de quantas instituições seu patrimônio toca. A proposta de alocação é apresentada em reunião. Com as contas abertas nas instituições escolhidas, o Open Finance consolida a visão em minutos — e a partir daí a operação é contínua.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ §09 · CTA ═══ -->\n<section id=\"cta\" class=\"section section-dark\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">09 · Próximo passo<\u002Fspan>\n      <span class=\"ts\">Consultiva · sem pitch<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"cta-block\">\n      <h2 class=\"cta-h2\" data-reveal=\"\">\n        Fale com<br>um <em>especialista.<\u002Fem>\n      <\u002Fh2>\n      <div class=\"cta-side\" data-reveal=\"\" data-delay=\"1\">\n        <p>\n          Conversa consultiva, com diagnóstico do seu patrimônio e uma direção clara. Sem pitch, sem produto na mesa, sem obrigação de seguir. Você sai com clareza  fique ou não fique. <a href=\"Landing Page.html\">Confiança que vira execução.<\u002Fa>\n        <\u002Fp>\n        <div id=\"anova-cta-form\" data-product=\"wealth-management\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div id=\"anova-footer\"><\u002Fdiv>\n\n<script>\n/* ─────────────────────────────────────────────────────────\n   ANOVA SHELL (inline · standalone build)\n   Usa window.__resources (blob URLs) em vez de fetch direto.\n   ───────────────────────────────────────────────────────── */\n(function () {\n  'use strict';\n\n  const navMount = document.getElementById('anova-nav');\n  const footerMount = document.getElementById('anova-footer');\n  const ctaMount = document.getElementById('anova-cta-form');\n  const currentPage = document.body.dataset.page || 'home';\n\n  async function injectPartial(resourceId, mount) {\n    if (!mount) return;\n    try {\n      const url = window.__resources && window.__resources[resourceId];\n      if (!url) throw new Error('missing resource ' + resourceId);\n      const res = await fetch(url);\n      if (!res.ok) throw new Error(`${resourceId} → ${res.status}`);\n      mount.innerHTML = await res.text();\n    } catch (err) {\n      console.error('[anova-shell] failed to load', resourceId, err);\n      mount.innerHTML = `<p style=\"padding:16px;color:#888;font-family:monospace;font-size:12px;\">Falha ao carregar ${resourceId}.<\u002Fp>`;\n    }\n  }\n\n  function markActivePage() {\n    document.querySelectorAll('[data-nav]').forEach(link => {\n      if (link.dataset.nav === currentPage) link.setAttribute('aria-current', 'page');\n    });\n  }\n\n  function wireMobileToggle() {\n    const nav = document.querySelector('.anova-nav');\n    if (!nav) return;\n    const toggle = nav.querySelector('.anova-nav-toggle');\n    if (!toggle) return;\n    toggle.addEventListener('click', (e) => {\n      e.stopPropagation();\n      const isOpen = !nav.classList.contains('mobile-open');\n      nav.classList.toggle('mobile-open', isOpen);\n      toggle.setAttribute('aria-expanded', String(isOpen));\n    });\n    document.addEventListener('click', (e) => {\n      if (!nav.contains(e.target) && nav.classList.contains('mobile-open')) {\n        nav.classList.remove('mobile-open');\n        toggle.setAttribute('aria-expanded', 'false');\n      }\n    });\n  }\n\n  function wireCtaForm() {\n    if (!ctaMount) return;\n    const form = ctaMount.querySelector('form.anova-cta-form');\n    if (!form) return;\n    const product = ctaMount.dataset.product;\n    if (product) {\n      const sel = form.querySelector('select[name=\"produto\"]');\n      if (sel) sel.value = product;\n    }\n    if (ctaMount.dataset.theme === 'light') form.classList.add('is-light');\n    form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      form.classList.add('was-validated');\n      if (!form.checkValidity()) return;\n      const btn = form.querySelector('.acf-submit');\n      const label = btn.querySelector('.acf-submit-label');\n      btn.classList.add('is-sending');\n      btn.disabled = true;\n      label.textContent = 'Enviando...';\n      setTimeout(() => {\n        btn.classList.remove('is-sending');\n        btn.classList.add('is-sent');\n        label.textContent = '✓ Recebemos. Falamos em até 1 dia útil.';\n      }, 600);\n    });\n  }\n\n  async function init() {\n    await Promise.all([\n      injectPartial('partialNav', navMount),\n      injectPartial('partialFooter', footerMount),\n      injectPartial('partialCtaForm', ctaMount),\n    ]);\n    markActivePage();\n    wireMobileToggle();\n    wireCtaForm();\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', init);\n  } else {\n    init();\n  }\n})();\n<\u002Fscript>\n<script>\n  (function () {\n    if (!('IntersectionObserver' in window)) {\n      document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('is-in'));\n      return;\n    }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.classList.add('is-in');\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n    document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
